<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link href="/css/bootstrap.min.css" rel="stylesheet">
  
  <title>登入畫面</title>  
  <style>
    body {
      background-color: #f8f9fa;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>

  <div class="card login-card">
    <h4 class="text-center mb-4">使用者登入</h4>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">帳號</label>
        <input type="text" class="form-control" id="username" placeholder="請輸入帳號" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">密碼</label>
        <input type="password" class="form-control" id="password" placeholder="請輸入密碼" required>
      </div>
      <button type="submit" class="btn btn-primary w-200">登入</button>
	  <button type="button" class="btn btn-primary w-200" id="checklogin">驗證</button>
    </form>
    <div class="text-center mt-3">
      <a href="#">還沒有帳號？點此註冊</a>
    </div>
  </div>

  
  <script>
	$("#checklogin").click(function(e){
		e.preventDefault();
		var tk=localStorage.getItem('token');
		if(tk!=null){
			$.ajax({
			        type: 'POST',
			        url: 'http://localhost:8080/api/check',
			        contentType: 'application/json',
			        data: JSON.stringify({"token": tk}),
			        success: function(res) {			          
			          alert(res.message);			         
			        },
			        error: function() {
			          alert('登入失敗，請確認帳密。');
			        }
			 });
		}else{
			alert('驗證失敗');
		}
	});
    $('#loginForm').submit(function(e) {
      e.preventDefault();

      const username = $('#username').val();
      const password = $('#password').val();

      $.ajax({
        type: 'POST',
        url: 'http://localhost:8080/api/login',
        contentType: 'application/json',
        data: JSON.stringify({ username, password }),
        success: function(res) {
          localStorage.setItem('token', res.token);
          console.log("token:"+res.token);
          alert('登入成功！');
          // location.href = '/products.html'; // 導向商品頁
        },
        error: function() {
          alert('登入失敗，請確認帳密。');
        }
      });
    });
    function fetchProtectedData() {
        const token = localStorage.getItem("token");
        
        $.ajax({
            url: "http://localhost:8080/api/protected/resource",
            type: "GET",
            headers: {
                "Authorization": "Bearer " + token // 將 Token 加入 Authorization Header
            },
            success: function(data) {
                console.log("Data received:", data);
            },
            error: function(xhr) {
                if (xhr.status === 401) {
                    alert("登入已過期，請重新登入");
                    handleLogout();
                }
            }
        });
    }
  </script>
</body>
</html>

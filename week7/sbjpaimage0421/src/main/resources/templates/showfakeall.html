<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Show All Products</title>
</head>
<body>
	<table border="1" width="80%">
		<thead>
			<tr>
				<th>ID</th>
				<th>Title</th>
				<th>Price</th>
				<th>Image</th>				
			</tr>
		</thead>
		<tbody>
			<tr th:each="p: ${products}">
				<td th:text="${p.id}"></td>
				<td th:text="${p.title}"></td>
				<td th:text="${p.price}"></td>
				<td>
				 <img th:src="@{|/fakeproducts/productimage/${p.id}|}" width="150" height="120" alt="No Image" />				
				</td>				
			</tr>
		</tbody>
	</table>
</body>
</html>

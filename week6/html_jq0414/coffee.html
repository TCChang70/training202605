<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coffee</title>
</head>
<body>
<script  src="http://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
Supplier ID: <input type="text" id="sid" value="105"/><br/>
Coffee Name: <input type="text" id="cname" value="Brown Coffee"/><br/>
price: <input type="text" id="price" value="30"/><br/>
sale: <input type="text" id="sale" value="35"/><br/>
total: <input type="text" id="total" value="100"/><br/>
<button id="add" >Add</button><button id="update" >update</button><br/>
<button id="remove" >remove</button>
<p>
<div id="message"></div>
<script>
    function result(data){
    	$("#message").html(data);
    }
    function add(){
    	// var  id= $("#sid").val();
    	// var  cname= $("#cname").val();
    	// var  price= $("#price").val();
    	// var  sale= $("#sale").val();
    	// var  total= $("#total").val();
    	
    	// $.post("CoffeeServlet",
        //    {"id":id ,"cname":cname,"price":price,"sale":sale,"total":total,"method":"add"},
        //    result);    	
            let cofName = $("#cname").val();
            let supId = $("#sid").val();
            let price = $("#price").val();
            let sales = $("#sale").val();
            let total = $("#total").val();
            let dataObj = { cofName, supId, price, sales, total };
            console.log(dataObj);
            $.ajax({
                method: 'POST',
                url: "http://localhost:8080/mvrshb0414/api/coffees",
                contentType: "application/json",
                data: JSON.stringify(dataObj),
                success: function (rs) {
                    $("#message").text(rs);
                }
            });
    }
    function update(){
    	  let cofName = $("#cname").val();
            let supId = $("#sid").val();
            let price = $("#price").val();
            let sales = $("#sale").val();
            let total = $("#total").val();
            let dataObj = { cofName, supId, price, sales, total };
            console.log(dataObj);
            $.ajax({
                method: 'PUT',
                url: "http://localhost:8080/mvrshb0414/api/coffees/"+cofName,
                contentType: "application/json",
                data: JSON.stringify(dataObj),
                success: function (rs) {
                    $("#message").text(rs);
                }
            });
    	
    }
    function remove(){
    	  let cofName = $("#cname").val();                    
            $.ajax({
                method: 'DELETE',
                url: "http://localhost:8080/mvrshb0414/api/coffees/"+cofName,
                dataType: "text",
                success: function (rs) {
                    $("#message").text(rs);
                }
            });
    }
    function events(){
    	$("#add").click(add);
    	$("#update").click(update);
    	$("#remove").click(remove);
    }
   $(document).ready(events);
</script>
</body>
</html>

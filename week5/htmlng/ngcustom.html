<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.staticfile.org/angular.js/1.8.1/angular.min.js"></script>
</head>
<body>
 
<div ng-app="myApp" ng-controller="myCtrl"> 
    <code-directive></code-directive>
    <p class="code-dir2"></p>
</div>
 
<script>
var app = angular.module('myApp', []);
app.directive("codeDirective", function() {
    return {
        restrict : "E",
        template : "<h1>自定義指令!</h1>"
    };

});
app.directive("codeDir2", function() {
    return {
        restrict : "C",
        template : "<h1>class自定義指令!</h1>"
    };

});
app.controller('myCtrl', function($scope) {
    
});

</script>

 
</body>
</html>

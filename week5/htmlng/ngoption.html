<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script src="https://cdn.staticfile.org/angular.js/1.8.1/angular.min.js"></script>
</head>

<body>
    <h2>範例演示 ng-options 指令的使用。</h2>
    <div ng-app="myApp" ng-controller="myCtrl">
        <select ng-init="selectedName = names[0]" ng-model="selectedName" 
        ng-options="x for x in names">
        </select>
        <h3>你選擇了: {{ selectedName }}</h3>
        <select ng-model="selectedSite">
            <option ng-repeat="x in sites" value="{{x.url}}"> {{x.site}} </option>
        </select>
        <h1>你選擇的是: {{selectedSite}}</h1>


    </div>
    <script>
        var app = angular.module('myApp', []);
        app.controller('myCtrl', function ($scope) {
            $scope.names = ["Google", "Facebook", "Taobao"];
            $scope.sites = [
                { site: "Google", url: "http://www.google.com" },
                { site: "Facebook", url: "https://www.Facebook.com" },
                { site: "Taobao", url: "http://www.taobao.com" }
            ];

        });
    </script>

</body>

</html>

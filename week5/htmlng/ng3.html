<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.staticfile.org/angular.js/1.8.1/angular.min.js"></script>
<style>
  
</style>
</head>
<body>

<div ng-app="myApp" ng-controller="myCtrl">
  <h2>ng-if 成績判斷範例</h2>

  姓名：<input type="text" ng-model="name"><br><br>
  成績：<input type="number" ng-model="score" min="0" max="100"><br><br>

  <div ng-if="score >= 90">
    🎉 {{ name }} 成績優秀（{{ score }} 分）！
  </div>

  <div  ng-if="score >= 60 && score < 90">
     {{ name }} 成績及格（{{ score }} 分）。
  </div>

  <div  ng-if="score < 60">
     {{ name }} 成績不及格（{{ score }} 分），請加油！
  </div>

  <hr>
  <h2>ng-if 顯示 / 隱藏範例</h2>

  <button ng-click="showDetails = !showDetails">
    {{ showDetails ? '隱藏' : '顯示' }} 詳細資料
  </button>

  <div  ng-if="showDetails">
    <strong>詳細資料：</strong><br>
    姓名：{{ name }}<br>
    成績：{{ score }} 分
  </div>
</div>

<script>
var app = angular.module('myApp', []);
app.controller('myCtrl', function($scope) {
    $scope.name = 'Amy';
    $scope.score = 60;
    $scope.showDetails = false;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My jQuery HTML Page</title>
    <style>
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

</head>

<body>
    <button id="myButton">Click Me</button><br/>
    <table id="product"  width="30%">        
    </table>        
    <script>
        myclick = function () {
            var arr = [{ "name": "Apple", "price": 60 }, 
             { "name": "Lemon", "price": 90 }, { "name": "Cherry", "price": 300 }];
            //$("#product").empty();  
            $("#product").attr("border", "1");          
            $("<tr></tr>").append($("<th></th>").text("No."))
                .append($("<th></th>").text("Product Name"))
                .append($("<th></th>").text("Price"))
                .appendTo("#product");

            $.each(arr, function (i) {
                var row = $("<tr></tr>");
                $("<td></td>").text(i + 1).appendTo(row);
                $("<td></td>").text(this.name).appendTo(row);
                $("<td></td>").text(this.price).appendTo(row);
                $("#product").append(row);
            });

        }
        function start() {
            $("#myButton").click(myclick);
        }
        $(document).ready(() => {
            console.log("jQuery is ready!");
            start();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My JS Page</title>
    <style>
    </style>
</head>

<body>
    <ul id="firstUL">
    </ul>

    <button onclick="nodeadd()">Add Item 1</button>
    <button onclick="nodeadd2()">Add Item 2</button>
     <button onclick="removelast()">remove last</button>
    <script>
        function removelast() {
            var head = document.getElementById('firstUL');
            head.removeChild(head.lastChild);
        }
        function nodeadd() {
            var head = document.getElementById('firstUL');
            for (var i = 1; i <= 3; i++) {
                li01 = document.createElement("li");
                li01.innerHTML = "顯示的文字 " + i;
                head.appendChild(li01);
            }

        }
        function nodeadd2() {
            var head = document.getElementById('firstUL');
            for (var i = 4; i <= 6; i++) {
                li01 = document.createElement("li");
                li01.textContent = "顯示的文字 " + i;
                head.appendChild(li01);
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My JS Page</title>   
    <style>      
    </style>     
</head>
<body>  
 <a id="foo" href="http://www.pcschool.com/" target="_blank" data-foo> gjun</a><p></p>
 <img id="img1" src="../htmljs0402/images/img7.jpg" alt="img7" width="200"/>

 <button onclick="show()">show attributes</button>
 <button onclick="change()">Change Attribute</button> 
 <button onclick="changeImage()">Change Image</button> 
 <script>
    function show(){
        // 取得目前頁面上的 foo 元素
    var foo = document.getElementById('foo');

    // 顯示 null
    console.log(foo.getAttribute('xyz'));

    // 顯示 http://www.pcschool.com/
    console.log(foo.getAttribute('href'));

    // 顯示 _blank
    console.log(foo.getAttribute('target'));

    // 顯示 "" 空字串
    console.log(foo.getAttribute('data-foo'));

    }  
    function change(){
        var foo = document.getElementById('foo');
        foo.setAttribute('href', 'http://tw.yahoo.com/');
        foo.setAttribute('target', '_self');
        foo.setAttribute('data-foo', 'new value');
    }
    function changeImage(){
        var img = document.getElementById('img1');
        img.setAttribute('src', '../htmljs0402/images/img8.jpg');
        img.setAttribute('alt', 'img8');
    }
</script>
</body>
</html>

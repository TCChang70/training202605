<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My JS Page</title>   
    <style>      
    </style>     
</head>
<body>  
 <div id="parent-id">
    <p>hello word1</p>
    <p class="test">hello word2</p>
    <p class="test">hello word3</p>
</div>
    <button onclick="test()">show</button>
   <script>
    function test(){
        let element = document.getElementById("parent-id");
        // console.log(element);
        let classelement = element.getElementsByClassName("test");
        for(let i=0; i<classelement.length; i++){
            console.log(classelement[i].innerText);
        }
        console.log("------------------");
        let tagelement = element.getElementsByTagName("p");
        //console.log(element);
        for(let i=0; i<tagelement.length; i++){
            console.log(tagelement[i].innerText);
        }
    }
   </script>
</body>
</html>

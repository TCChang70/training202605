<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Form</title>
</head>
<body>
<form action="bookop" method="post">
<fieldset style="width:30%">
  <legend>Book Add Form</legend>
  <table> 
  <tr> 
    <td>Book ID:</td><td><input type="text" name="bid" value="10"/></td>
  </tr>
  <tr>
    <td>Book Name:</td><td><input type="text" name="bname" value="C# Programming"/></td>
  </tr>
  <tr>
    <td>Book Author:</td><td><input type="text" name="author" value="Dennis"/></td>
  </tr>
  <tr>
   <td>Book Price:</td><td><input type="text" name="price" value="350"/></td>
  </tr>
  <tr>
    <td><input type="submit" value="Save"/></td>
  </tr>
  </table>
 </fieldset>
</form>
</body>
</html>

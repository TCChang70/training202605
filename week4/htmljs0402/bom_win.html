<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My JS Page</title>   
    <style>      
    </style>   
   
</head>
<body>  
    <h1 id="tag1">Welcome to My First JavaScript Page</h1>
    <button onclick="openwin()">Open new Window</button>
    <button onclick="locationTransfer()">Location Transfer</button>
    <button onclick="timeOut()">TimeOut</button>
   
</body>
<script>
function openwin(){
    window.open("https://tw.yahoo.com/","yahoo","width=400,height=300,status=yes,location=no,menubar=no,toolbar=yes");
}

function locationTransfer(){
    location.href = "https://www.google.com.tw/";
}

function timeOut(){
    window.setTimeout(locationTransfer, 3000);
}
</script>
</html>
